<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raghav Maheshwari | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6', // Bright Blue
            secondary: '#64748b',
            dark: '#050505', // Deep Black
            'dark-card': '#0a0a0a', // Slightly lighter black for cards
            'dark-border': '#262626',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'blob': 'blob 7s infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      background-color: #050505;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    /* Tech Grid Background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: -1;
    }

    .fade-in-section {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      will-change: opacity, transform;
    }

    .fade-in-section.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Sleek Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3b82f6;
    }

    /* Enhanced Spotlight Effect Utilities */
    .spotlight-card {
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      border: 1px solid #1f1f1f;
      transition: border-color 0.3s ease;
    }

    .spotlight-card:hover {
      border-color: rgba(59, 130, 246, 0.3);
    }

    .spotlight-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: inherit;
      padding: 1px;
      background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y),
          rgba(59, 130, 246, 0.15),
          transparent 40%);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      z-index: 2;
    }

    .spotlight-card:hover::before {
      opacity: 1;
    }

    /* Blog Content Styles */
    .prose {
      color: #94a3b8;
    }

    .prose h2 {
      color: #f8fafc;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    .prose p {
      margin-bottom: 1.25rem;
      line-height: 1.8;
    }

    .prose pre {
      background: #111;
      border: 1px solid #333;
      border-radius: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      color: #a5b4fc;
    }

    /* Input Auto-fill fix for dark mode */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
      -webkit-text-fill-color: white !important;
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-[#050505] text-slate-100 selection:bg-primary/30 selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.jsx"></script>
</body>

</html>
